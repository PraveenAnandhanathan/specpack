schema_version: "1.0"

preset:
  id: "lean"
  name: "Lean Workflow"
  version: "1.0.0"
  description: "Minimal core workflow commands - just the prompt, just the artifact"
  author: "github"
  repository: "https://github.com/github/specpack"
  license: "MIT"

requires:
  specpack_version: ">=0.6.0"

provides:
  templates:
    - type: "command"
      name: "specpack.specify"
      file: "commands/specpack.specify.md"
      description: "Lean specify - create spec.md from a feature description"
      replaces: "specpack.specify"

    - type: "command"
      name: "specpack.plan"
      file: "commands/specpack.plan.md"
      description: "Lean plan - create plan.md from the spec"
      replaces: "specpack.plan"

    - type: "command"
      name: "specpack.tasks"
      file: "commands/specpack.tasks.md"
      description: "Lean tasks - create tasks.md from plan and spec"
      replaces: "specpack.tasks"

    - type: "command"
      name: "specpack.implement"
      file: "commands/specpack.implement.md"
      description: "Lean implement - execute tasks from tasks.md"
      replaces: "specpack.implement"

    - type: "command"
      name: "specpack.constitution"
      file: "commands/specpack.constitution.md"
      description: "Lean constitution - create or update project constitution"
      replaces: "specpack.constitution"

tags:
  - "lean"
  - "minimal"
  - "workflow"
