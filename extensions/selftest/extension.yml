schema_version: "1.0"
extension:
  id: selftest
  name: SpecPack Self-Test Utility
  version: 1.0.0
  description: Verifies catalog extensions by programmatically walking through the discovery, installation, and registration lifecycle.
  author: specpack-core
  repository: https://github.com/github/specpack
  license: MIT
requires:
  specpack_version: ">=0.2.0"
provides:
  commands:
    - name: specpack.selftest.extension
      file: commands/selftest.md
      description: Validate the lifecycle of an extension from the catalog.
